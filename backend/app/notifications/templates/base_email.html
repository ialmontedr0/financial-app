<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f4f4; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: #ffffff; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .header { background: #2c3e50; color: #ffffff; padding: 24px; text-align: center; }
        .header h1 { margin: 0; font-size: 22px; }
        .body-content { padding: 24px; color: #333333; line-height: 1.6; }
        .body-content h2 { margin-top: 0; }
        .footer { background: #ecf0f1; color: #7f8c8d; padding: 16px 24px; text-align: center; font-size: 12px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Financial Intelligence Platform</h1>
        </div>
        <div class="body-content">
            <h2>{{ title }}</h2>
            <p>{{ body }}</p>
        </div>
        <div class="footer">
            <p>Financial Intelligence Platform &mdash; Notificacion Automatica</p>
        </div>
    </div>
</body>
</html>
